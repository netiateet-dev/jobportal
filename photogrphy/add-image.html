<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Image</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header style="background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%); color: #fff; text-align: center; padding: 2rem 0 1rem 0;">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
        <h1 style="margin:0; font-size:2rem; font-weight:600;"><i class="fas fa-camera-retro"></i> Add Image</h1>
    </header>
    <main>
        <div class="add-image-main" style="max-width:500px;margin:2.5rem auto 0 auto;background:#fff;border-radius:18px;box-shadow:0 4px 24px rgba(44,62,80,0.13);padding:2rem 1.5rem;text-align:center;">
            <form id="addImageForm">
                <div class="form-group">
                    <input type="text" id="imgUrl" placeholder="Image URL" required>
                </div>
                <div class="form-group">
                    <input type="text" id="imgCaption" placeholder="Caption" required>
                </div>
                <div class="form-group">
                    <input type="password" id="addImgPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Add</button>
                <p id="addImgError" class="modal-error" style="display:none;">Incorrect password. Try again.</p>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
